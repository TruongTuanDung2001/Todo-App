<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="layout">
            <div class="sidebar sidebar--left">
                <div class="sidebar__header">
                    <div class="sidebar__logo"></div>
                    <div class="sidebar__title"></div>
                </div>
                
                <div class="sidebar__info">
                    <div class="sidebar__avatar"></div>
                    <div class="sidebar__name"></div>
                    <div class="sidebar__email"></div>
                </div>

                <ul class="sidebar__menu">
                    <li class="sidebar__item">
                        <div class="sidebar__item-icon"></div>
                        <a href="" class="sidebar__item-link"></a>
                    </li>
                </ul>
            </div>
            <div class="layout__main"></div>
            <div class="sidebar sidebar--right"></div>
        </div>
    </div>
    <!--  -->
</body>
<script src="script.js"></script>
</html>
